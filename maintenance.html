<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WILD SAALA | Regrouping</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;700&display=swap');

        :root {
            --accent: #39FF14;
            --bg: #050505;
            --text: #ffffff;
            --gray: #888888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
        }

        .background-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 1;
        }

        .glow-sphere {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(57, 255, 20, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(50px);
            z-index: 0;
            animation: pulse 4s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); opacity: 0.5; }
            to { transform: scale(1.2); opacity: 0.8; }
        }

        .content {
            position: relative;
            z-index: 10;
            max-width: 800px;
            padding: 20px;
        }

        .logo {
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 2.5rem;
            letter-spacing: -2px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logo i {
            color: var(--accent);
            animation: flicker 0.5s infinite alternate;
        }

        @keyframes flicker {
            0% { opacity: 1; text-shadow: 0 0 10px var(--accent); }
            100% { opacity: 0.6; text-shadow: none; }
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(2rem, 8vw, 4rem);
            line-height: 1;
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: -2px;
            position: relative;
        }

        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
        }

        .glitch-text::before {
            left: 2px;
            text-shadow: -2px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        .glitch-text::after {
            left: -2px;
            text-shadow: -2px 0 #00fff9, 2px 2px #ff00c1;
            animation: glitch-anim2 1s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(31px, 9999px, 94px, 0); }
            5% { clip: rect(70px, 9999px, 71px, 0); }
            10% { clip: rect(29px, 9999px, 83px, 0); }
            15% { clip: rect(16px, 9999px, 91px, 0); }
            20% { clip: rect(2px, 9999px, 23px, 0); }
            /* ... more steps ... */
            100% { clip: rect(67px, 9999px, 62px, 0); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(65px, 9999px, 100px, 0); }
            /* ... more steps ... */
            100% { clip: rect(11px, 9999px, 25px, 0); }
        }

        p {
            font-size: 1.2rem;
            color: var(--gray);
            margin-bottom: 40px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(57, 255, 20, 0.1);
            color: var(--accent);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            border: 1px solid rgba(57, 255, 20, 0.3);
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 40px;
        }

        .social-links a {
            color: var(--gray);
            font-size: 1.5rem;
            transition: all 0.3s ease;
        }

        .social-links a:hover {
            color: var(--accent);
            transform: translateY(-5px);
        }

        .countdown {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 40px;
        }

        .countdown-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .countdown-value {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .countdown-label {
            font-size: 0.6rem;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="background-lines"></div>
    <div class="glow-sphere"></div>
    <div class="noise-overlay"></div>

    <div class="content">
        <div class="logo">
            <i class="fas fa-bolt"></i>
            WILD SAALA
        </div>

        <div class="status-badge">
            <div class="status-dot"></div>
            System Regrouping in Progress
        </div>

        <h1 class="glitch-text" data-text="THE TRIBE IS REGROUPING">THE TRIBE IS REGROUPING</h1>
        
        <p>We're sharpening our claws for the next drop. The streets aren't ready.</p>

        <div class="countdown">
            <div class="countdown-item">
                <span class="countdown-value">W</span>
                <span class="countdown-label">Stay</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-value">I</span>
                <span class="countdown-label">Wild</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-value">L</span>
                <span class="countdown-label">Stay</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-value">D</span>
                <span class="countdown-label">Free</span>
            </div>
        </div>

        <div class="social-links">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-discord"></i></a>
            <a href="mailto:support@wildsaala.com"><i class="fas fa-envelope"></i></a>
        </div>
    </div>

    <script>
        // Subtle mouse move effect for glow sphere
        document.addEventListener('mousemove', (e) => {
            const sphere = document.querySelector('.glow-sphere');
            const x = e.clientX;
            const y = e.clientY;
            
            sphere.style.left = x - 200 + 'px';
            sphere.style.top = y - 200 + 'px';
        });
    </script>
</body>
</html>
